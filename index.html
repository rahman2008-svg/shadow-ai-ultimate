<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Shadow Mini AI</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
  <div class="column">
    <h2>💬 Ask AI</h2>
    <input type="text" id="ask_input" placeholder="প্রশ্ন লিখুন..." />
    <button onclick="askAI()">Ask</button>
    <div id="chat_output"></div>
  </div>
  <div class="column">
    <h2>📝 Teach AI</h2>
    <input type="text" id="teach_q" placeholder="Question..." />
    <input type="text" id="teach_a" placeholder="Answer..." />
    <button onclick="teachAI()">Teach</button>
    <div id="teach_output"></div>
  </div>
</div>
<script src="/static/script.js"></script>
</body>
</html>
