<!DOCTYPE html>
<html>
<body style="background:#111;color:white;font-family:sans-serif">

<h2>🤖 Shadow AI Ultimate</h2>

<input id="q" placeholder="Ask something..." style="width:70%">
<button onclick="ask()">Send</button>
<button onclick="voice()">🎤</button>

<br><br>

<input id="tq" placeholder="Teach Q">
<input id="ta" placeholder="Teach A">
<button onclick="teach()">Teach</button>

<div id="chat"></div>

<script>
function speak(text){
 let s=new SpeechSynthesisUtterance(text);
 s.lang="bn-BD";
 speechSynthesis.speak(s);
}

async function ask(){
 let q=document.getElementById("q").value;

 let res=await fetch("/ask",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({q:q})
 });

 let d=await res.json();

 document.getElementById("chat").innerHTML+=
 "<p>🧑 "+q+"</p><p>🤖 "+d.a+"</p>";

 speak(d.a);
}

async function teach(){
 let q=document.getElementById("tq").value;
 let a=document.getElementById("ta").value;

 await fetch("/teach",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({q:q,a:a})
 });

 alert("AI শিখেছে 😎");
}

// 🎤 Voice Input
function voice(){
 let rec=new webkitSpeechRecognition();
 rec.lang="bn-BD";

 rec.onresult=function(e){
  let text=e.results[0][0].transcript;
  document.getElementById("q").value=text;
  ask();
 };

 rec.start();
}
</script>

</body>
</html>
