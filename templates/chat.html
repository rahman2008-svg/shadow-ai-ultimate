<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
 background:#343541;
 color:white;
 font-family:sans-serif;
}

.chat{
 max-width:700px;
 margin:auto;
}

.msg{
 padding:12px;
 margin:10px;
 border-radius:12px;
}

.user{background:#444654;text-align:right;}
.bot{background:#202123;}

input{
 width:75%;
 padding:10px;
 border-radius:10px;
 border:none;
}

button{
 padding:10px;
 border:none;
 background:#10a37f;
 color:white;
 border-radius:10px;
}
</style>
</head>

<body>

<div class="chat">
<h2>🤖 Shadow Chat AI</h2>

<div id="chat"></div>

<input id="q" placeholder="Send a message...">
<button onclick="ask()">Send</button>

</div>

<script>
async function ask(){
 let q=document.getElementById("q").value;

 document.getElementById("chat").innerHTML +=
 `<div class='msg user'>${q}</div>`;

 document.getElementById("chat").innerHTML +=
 `<div class='msg bot'>Typing...</div>`;

 let res=await fetch("/ask",{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify({q:q})
 });

 let d=await res.json();

 document.getElementById("chat").innerHTML =
 document.getElementById("chat").innerHTML.replace("Typing...", d.a);
}
</script>

</body>
</html>
